name: Exécution des jobs cron Kërjom

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la fonction Edge Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X POST "${SUPABASE_URL}/functions/v1/run-scheduled-jobs" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            --max-time 30 \
            --silent \
            --show-error

      - name: Notifier en cas d'échec
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL}" ]; then
            curl -s -X POST "${SLACK_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"🔴 *Kërjom cron job FAILED* — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>\"}"
          fi
          exit 1
